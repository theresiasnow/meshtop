name: Bug Report
description: Report a bug or unexpected behaviour in meshtop
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. Please fill in as much detail as you can — GPS source and operating conditions are especially helpful.

  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear and concise summary of the bug.
      placeholder: "e.g. meshtop crashes when switching from serial to LoRa source"
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: List the exact steps needed to trigger the bug.
      placeholder: |
        1. Start meshtop with `uv run meshtop`
        2. Connect to serial source on COM3
        3. Switch to LoRa source
        4. Observe crash / incorrect behaviour
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behaviour
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behaviour
      description: What actually happened? Include any error messages shown in the terminal.
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: Operating system
      options:
        - Windows 11
        - Windows 10
        - macOS 14 (Sonoma)
        - macOS 13 (Ventura)
        - macOS 12 (Monterey)
        - Ubuntu 24.04
        - Ubuntu 22.04
        - Debian 12
        - Other Linux
        - Other
    validations:
      required: true

  - type: input
    id: python_version
    attributes:
      label: Python version
      description: Output of `uv run python --version`
      placeholder: "e.g. Python 3.12.3"
    validations:
      required: true

  - type: input
    id: gps_source
    attributes:
      label: GPS source
      description: The GPS source you are using (serial / LoRa, device model if known).
      placeholder: "e.g. Seeed Wio Tracker 1110 via serial, TTN LoRa gateway"
    validations:
      required: false

  - type: input
    id: meshtop_version
    attributes:
      label: meshtop version (git hash)
      description: Output of `git rev-parse --short HEAD` in the meshtop directory.
      placeholder: "e.g. 76b572a"
    validations:
      required: true

  - type: textarea
    id: log_snippet
    attributes:
      label: Log snippet
      description: |
        Paste the relevant portion of the meshtop log or terminal output.
        Wrap in a code block or use the monospace button above.
      render: text
      placeholder: |
        2026-03-21 14:03:22 | ERROR | meshtop.sources.serial | Serial port not found: COM3
    validations:
      required: false

  - type: textarea
    id: additional_context
    attributes:
      label: Additional context
      description: |
        Anything else that might be relevant — antenna type, MQTT broker details,
        APRS path, NMEA sink configuration, network topology, pi-star version, etc.
    validations:
      required: false
