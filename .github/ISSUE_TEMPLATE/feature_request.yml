name: Feature Request
description: Propose a new feature or enhancement for meshtop
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Have an idea that would make meshtop more useful in the field? Describe it below.
        The more operating context you can share, the easier it is to evaluate.

  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear and concise summary of the feature you would like to see.
      placeholder: "e.g. Add a Winlink position report sink"
    validations:
      required: true

  - type: textarea
    id: motivation
    attributes:
      label: Use case / motivation
      description: |
        Why do you need this? What problem does it solve for you in the field or in your shack?
      placeholder: |
        When running portable APRS, I want meshtop to forward positions to Winlink
        so I can check in on the network without a separate application.
    validations:
      required: true

  - type: textarea
    id: proposed_solution
    attributes:
      label: Proposed solution
      description: |
        How do you imagine this working? Feel free to sketch a config snippet, CLI flag,
        or interaction — rough ideas are fine.
      placeholder: |
        A new sink `[sinks.winlink]` that reads callsign + position from the existing
        pipeline and sends a check-in message via Winlink every 30 minutes.
    validations:
      required: false

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: |
        Have you tried any workarounds or other tools? Why are they not sufficient?
    validations:
      required: false

  - type: textarea
    id: ham_radio_context
    attributes:
      label: Ham radio context
      description: |
        Relevant station details that help scope the request: GPS source, operating mode,
        licence class, typical workflow (portable / fixed / SOTA / emergency comms), etc.
      placeholder: |
        Source: Seeed Wio Tracker 1110 via serial
        Sinks: APRS-IS + pi-star NMEA
        Workflow: SOTA activations where grid square changes every outing
    validations:
      required: false

  - type: checkboxes
    id: contribution
    attributes:
      label: Willing to contribute?
      options:
        - label: I would like to implement this myself and open a PR
          required: false
        - label: I can help test a prototype if someone else builds it
          required: false
