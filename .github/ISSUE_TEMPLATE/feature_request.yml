name: Feature Request
description: Propose a new feature or enhancement for meshtop
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Have an idea that would make meshtop more useful? Describe it below.
        The more operating context you can share, the easier it is to evaluate.

  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear and concise summary of the feature you would like to see.
      placeholder: "e.g. Add a Winlink gateway sink to forward position packets"
    validations:
      required: true

  - type: textarea
    id: motivation
    attributes:
      label: Use case / motivation
      description: |
        Why do you need this? What problem does it solve for you?
      placeholder: |
        When running SOTA activations, I want meshtop to forward my GPS position
        to Winlink so my location is visible on Winlink maps without manual entry.
    validations:
      required: true

  - type: textarea
    id: proposed_solution
    attributes:
      label: Proposed solution
      description: |
        How do you imagine this working? Feel free to sketch a config snippet, CLI flag,
        or TUI interaction — rough ideas are fine.
      placeholder: |
        A new sink `[sinks.winlink]` that reads callsign + position from the existing
        pipeline and submits a position report every 5 minutes.
    validations:
      required: false

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: |
        Have you tried any workarounds or other tools? Why are they not sufficient?
    validations:
      required: false

  - type: textarea
    id: device_context
    attributes:
      label: Device / operating context
      description: |
        Relevant device details that help scope the request: Meshtastic device model,
        source type (serial/LoRa/BLE), typical workflow, etc.
      placeholder: |
        Device: Seeed Wio Tracker 1110
        Source: serial (direct USB)
        Workflow: SOTA activations where grid square changes every outing
    validations:
      required: false

  - type: checkboxes
    id: contribution
    attributes:
      label: Willing to contribute?
      options:
        - label: I would like to implement this myself and open a PR
          required: false
        - label: I can help test a prototype if someone else builds it
          required: false
